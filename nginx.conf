server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Anasayfa - statik HTML göster
    location = / {
        try_files /index.html =404;
    }

    # Shopify CDN proxy (görseller, CSS, fontlar için)
    # Site kapatıldıktan sonra bu çalışmayacak, local asset'ler kullanılacak
    location /cdn/ {
        try_files $uri @cdn_fallback;
    }

    location @cdn_fallback {
        return 301 https://ecmastore.com/;
    }

    # Ürün sayfaları -> ecmastore.com ana sayfaya yönlendir
    location /products/ {
        return 301 https://ecmastore.com/;
    }

    # Koleksiyon/kategori sayfaları -> ecmastore.com ana sayfaya yönlendir
    location /collections/ {
        return 301 https://ecmastore.com/;
    }

    # Sayfalar -> ecmastore.com'a yönlendir
    location /pages/ {
        return 301 https://ecmastore.com/;
    }

    # Sepet, hesap, checkout -> ecmastore.com
    location /cart {
        return 301 https://ecmastore.com/;
    }

    location /account {
        return 301 https://ecmastore.com/;
    }

    location /checkout {
        return 301 https://ecmastore.com/;
    }

    # Blog varsa
    location /blogs/ {
        return 301 https://ecmastore.com/;
    }

    # Arama
    location /search {
        return 301 https://ecmastore.com/;
    }

    # Shopify API/admin endpointleri
    location /admin {
        return 404;
    }

    # Diğer tüm istekler -> ecmastore.com
    location / {
        try_files $uri $uri/ @redirect;
    }

    location @redirect {
        return 301 https://ecmastore.com/;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache headers
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
