server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Anasayfa - statik HTML göster
    location = / {
        try_files /index.html =404;
    }

    # Statik asset'ler (görseller, CSS, fontlar)
    location /cdn/ {
        try_files $uri @redirect;
    }

    # Tüm diğer istekler -> ecmastore.com (aynı path ile)
    location / {
        try_files $uri $uri/ @redirect;
    }

    location @redirect {
        return 301 https://ecmastore.com$request_uri;
    }

    # Shopify admin - 404
    location /admin {
        return 404;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache headers
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
